# Continuous Integration
#
# This workflow is stack-agnostic: it inspects the repository contents to
# decide whether Node.js and/or Python validation should run, then skips
# any individual step (install, lint, test, build) whose tooling is not
# configured for the project. It is designed to work unmodified across
# projects created from this template, regardless of which stack(s) they use.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Allow triggering a run manually from the Actions tab.
  workflow_dispatch:

# Cancel any in-progress run for the same branch/PR when new commits arrive.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: jobs only need read access to check out code.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # Detect which stack(s) are present in the repository so downstream jobs
  # can be skipped entirely when their ecosystem isn't used by the project.
  # ---------------------------------------------------------------------
  detect:
    name: Detect project stack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_node: ${{ steps.detect.outputs.has_node }}
      has_python: ${{ steps.detect.outputs.has_python }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Node.js / Python project files
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------
  # Node.js validation: only runs when package.json is present.
  # ---------------------------------------------------------------------
  node:
    name: Node.js
    needs: detect
    if: needs.detect.outputs.has_node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Identify the package manager from lockfiles so the correct install
      # command and dependency cache are used. Falls back to npm without
      # caching when no lockfile exists yet (e.g. a brand-new project).
      - name: Detect package manager
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "cache=true" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "cache=true" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "cache=true" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "cache=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.pm.outputs.cache == 'true' && steps.pm.outputs.manager || '' }}

      - name: Enable Corepack (required for yarn/pnpm)
        if: steps.pm.outputs.manager != 'npm'
        run: corepack enable

      - name: Install dependencies
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm)
              pnpm install --frozen-lockfile
              ;;
            yarn)
              yarn install --frozen-lockfile
              ;;
            npm)
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install
              fi
              ;;
          esac

      # --if-present makes npm exit successfully instead of failing when
      # the named script is not defined in package.json, giving the
      # "skip gracefully" behavior required for a stack-agnostic template.
      - name: Run lint (skipped if no "lint" script is defined)
        run: npm run lint --if-present

      - name: Run tests (skipped if no "test" script is defined)
        run: npm run test --if-present

      - name: Run build (skipped if no "build" script is defined)
        run: npm run build --if-present

  # ---------------------------------------------------------------------
  # Python validation: only runs when requirements.txt or pyproject.toml
  # is present.
  # ---------------------------------------------------------------------
  python:
    name: Python
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f pyproject.toml ]; then
            echo "Installing project defined in pyproject.toml"
            # Some templates ship a pyproject.toml that only holds tool
            # config (e.g. [tool.ruff]) with no installable [project]
            # table. Don't fail the job if that's the case.
            pip install . || echo "::warning::'pip install .' failed - pyproject.toml may not define an installable project, continuing"
          fi

          if [ -f requirements.txt ]; then
            echo "Installing dependencies from requirements.txt"
            pip install -r requirements.txt
          fi

      # Tools are only run if the project's own dependencies made them
      # available - nothing is force-installed by this workflow.
      - name: Run ruff (skipped if not installed by the project)
        run: |
          if command -v ruff >/dev/null 2>&1; then
            ruff check .
          else
            echo "ruff not found - skipping lint"
          fi

      - name: Run pytest (skipped if not installed by the project)
        run: |
          if command -v pytest >/dev/null 2>&1; then
            pytest
          else
            echo "pytest not found - skipping tests"
          fi

  # ---------------------------------------------------------------------
  # Single required status check for branch protection. Since the node
  # and python jobs are conditionally skipped depending on the repo's
  # stack, this job gives a stable, always-present check name that
  # reflects whichever jobs actually ran.
  # ---------------------------------------------------------------------
  ci:
    name: CI Summary
    needs: [detect, node, python]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.node.result }}" = "failure" ] || [ "${{ needs.python.result }}" = "failure" ]; then
            echo "One or more validation jobs failed."
            exit 1
          fi
          echo "All applicable validation jobs passed (or were skipped)."
